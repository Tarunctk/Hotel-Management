<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Guest Booking</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header style="display:flex; justify-content: space-between; align-items:center;">
  <h1>Guest Booking</h1>
  <button onclick="goBack()">⬅ Back</button>
</header>

<!-- ✅ HOTEL LIST -->
<section>

<h3>Hotel List</h3>

<input id="hotelSearch" placeholder="Search hotel..." onkeyup="searchHotels()">

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Location</th>
</tr>
</thead>
<tbody id="hotelTable"></tbody>
</table>

<div class="pagination">
<button onclick="prevHotel()">Previous</button>
<span id="hotelPageInfo"></span>
<button onclick="nextHotel()">Next</button>
</div>

</section>

<!-- ✅ ROOM TYPE LIST -->
<section>

<h3>Room Type List</h3>

<input id="roomTypeSearch" placeholder="Search room type..." onkeyup="searchRoomTypes()">

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Max Occupancy</th>
<th>Strategy</th>
</tr>
</thead>
<tbody id="roomTypeTable"></tbody>
</table>

<div class="pagination">
<button onclick="prevRoomType()">Previous</button>
<span id="roomTypePageInfo"></span>
<button onclick="nextRoomType()">Next</button>
</div>

</section>

<!-- ✅ BOOKING -->
<section>

<h2>Create Booking (Guest)</h2>

<div class="form-row" style="display:flex; gap:10px; flex-wrap:wrap;">

  <input id="guestName" placeholder="Your Name">

  <input type="email" id="email" placeholder="Your Email">

  <select id="bookingRoomTypeId"></select>

  <input id="checkInDate" type="date">
  <input id="checkOutDate" type="date">

  <button onclick="checkBookingPrice()">Check Price</button>

  <button id="createBookingBtn" onclick="createBooking()" disabled>
    Create Booking
  </button>

</div>

<p id="bookingPriceResult"></p>

</section>

<h3>Your Bookings</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Guest</th>
<th>Room Type</th>
<th>Check In</th>
<th>Check Out</th>
<th>Total</th>
<th>Status</th>
<th>Room ID</th>
<th>Action</th>
</tr>
</thead>
<tbody id="bookingTable"></tbody>
</table>

<script src="script.js"></script>

<script>
function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
