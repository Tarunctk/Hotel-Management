<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>User Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div style="display:flex; justify-content: space-between; align-items: center;">
  <h1>Hotel Management - User Panel</h1>
  <button onclick="logout()">Logout</button>
</div>


<!-- HOTEL -->

<section>

<h3>Hotel List</h3>

<input id="hotelSearch" placeholder="Search hotel..." onkeyup="searchHotels()">

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Location</th>
</tr>
</thead>
<tbody id="hotelTable"></tbody>
</table>

<div class="pagination">
<button onclick="prevHotel()">Previous</button>
<span id="hotelPageInfo"></span>
<button onclick="nextHotel()">Next</button>
</div>

</section>

<!-- ROOM TYPE -->

<section>

<h3>Room Type List</h3>

<input id="roomTypeSearch" placeholder="Search room type..." onkeyup="searchRoomTypes()">

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Max Occupancy</th>
<th>Strategy</th>
</tr>
</thead>
<tbody id="roomTypeTable"></tbody>
</table>

<div class="pagination">
<button onclick="prevRoomType()">Previous</button>
<span id="roomTypePageInfo"></span>
<button onclick="nextRoomType()">Next</button>
</div>

</section>

<!-- BOOKING -->

<section>

<h2>Create Booking</h2>

<div class="form-row" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">

  <input id="guestName" placeholder="Guest Name">

<select id="bookingRoomTypeId"></select>

<label>Check-In</label> <input id="checkInDate" type="date">

<label>Check-Out</label> <input id="checkOutDate" type="date">

<input type="email" id="email" placeholder="Enter email" required />

<button onclick="checkBookingPrice()">Check Price</button>

  <button id="createBookingBtn" onclick="createBooking()" disabled>
    Create Booking
  </button>

</div>

<p id="bookingPriceResult"></p>

<h3>My Bookings</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Guest</th>
<th>Room Type</th>
<th>Check In</th>
<th>Check Out</th>
<th>Total Cost</th>
<th>Status</th>
<th>Room ID</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>

</table>

<div class="pagination">
<button onclick="prevBooking()">Previous</button>
<span id="bookingPageInfo"></span>
<button onclick="nextBooking()">Next</button>
</div>

</section>

<script src="script.js"></script>

</body>
</html>
